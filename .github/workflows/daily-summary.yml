name: Daily Summary

on:
  schedule:
    # 02:00 UTC = 10:00 Asia/Shanghai  → digest of YESTERDAY
    - cron: '0 2 * * *'
    # 08:00 UTC = 16:00 Asia/Shanghai  → digest of TODAY so far
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      report_scope:
        description: 'yesterday | today (default: yesterday)'
        required: false
        default: 'yesterday'
        type: choice
        options: [yesterday, today]
      report_day:
        description: 'Explicit YYYY-MM-DD (overrides report_scope).'
        required: false
        default: ''
      dry_run:
        description: 'If "1", print to log instead of sending to Dingtalk.'
        required: false
        default: ''

permissions:
  contents: read

concurrency:
  group: daily-summary
  cancel-in-progress: false

jobs:
  summary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run summary
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
          # Pick the scope:
          #  - manual dispatch → user-provided
          #  - 02:00 UTC cron → yesterday
          #  - 08:00 UTC cron → today
          REPORT_SCOPE: ${{ github.event.inputs.report_scope || (github.event.schedule == '0 8 * * *' && 'today' || 'yesterday') }}
          REPORT_DAY: ${{ github.event.inputs.report_day }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: python -m scripts.summary

